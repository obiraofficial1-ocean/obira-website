<!DOCTYPE html>

<head>
<title>Cart - OBIRA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center;margin-top:40px;">Your Cart</h2>

<button onclick="clearCart()" style="margin:20px;">Reset Cart</button>

<div id="cart-items"></div>

<div style="text-align:center;margin-top:20px;">
<h3>Total: ₹<span id="cart-total">0</span></h3>

<button onclick="checkout()">Proceed to Payment</button>
</div>

<script src="products.js"></script>
<script src="script.js"></script>

<script>

function clearCart(){
localStorage.removeItem("cart");
location.reload();
}

function loadCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart-items");
const totalEl = document.getElementById("cart-total");

container.innerHTML = "";
let total = 0;

if(cart.length === 0){
container.innerHTML = "<p style='text-align:center;'>Your cart is empty</p>";
totalEl.innerText = 0;
return;
}

cart.forEach(item => {

total += item.price;

container.innerHTML += `
<div style="text-align:center;margin:20px;">
<img src="${item.image}" width="120">
<p>${item.name}</p>
<p>₹${item.price}</p>
</div>
`;

});

totalEl.innerText = total;

}

document.addEventListener("DOMContentLoaded", loadCart);

function checkout(){
alert("Next step: Payment integration 💳");
}
