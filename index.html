<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBIRA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins';background:#fff;color:#111}
.nav{position:fixed;width:100%;display:flex;justify-content:space-between;padding:18px 8%;background:rgba(255,255,255,0.6);backdrop-filter:blur(12px);z-index:1000}
.hero{height:100vh;position:relative}
.slide{position:absolute;width:100%;height:100%;opacity:0;transition:1s}
.slide.active{opacity:1}
.slide video,.slide img{width:100%;height:100%;object-fit:cover}
.hero-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;text-align:center}
.hero-text h1{font-size:60px;font-family:'Playfair Display'}
.section{padding:100px 8%}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px}
.product{cursor:pointer}
.product img{width:100%}
.gallery{display:flex;gap:10px;margin-top:10px}
.gallery img{width:60px;cursor:pointer}
.productPage{position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:2000;display:none;padding:40px;overflow:auto}
.btn{padding:12px 20px;border:none;border-radius:25px;margin:5px;cursor:pointer}
.cart{position:fixed;right:-300px;top:0;width:300px;height:100%;background:white;transition:0.4s;padding:20px}
.cart.open{right:0}
.footer{background:#111;color:white;text-align:center;padding:40px}
</style>
</head>

<body>

<div class="nav">
<b>OBIRA</b>
<div onclick="toggleCart()">🛒 <span id="count">0</span></div>
</div>

<!-- HERO -->
<div class="hero">
<div class="slide active"><video autoplay muted loop src="videos/Hero-V1.mp4"></video></div>
<div class="slide"><video autoplay muted loop src="videos/Hero-V2.mp4"></video></div>
<div class="slide"><img src="images/Hero-I1.jpg"></div>
<div class="hero-text">
<h1>OBIRA</h1>
<p>You don’t wear OBIRA. You become it.</p>
</div>
</div>

<!-- STORE -->
<div class="section">
<h2>Signature</h2>
<div class="products">

<div class="product" onclick="openProduct('Chic Radiance Bracelet',1199,['images/Bracelets-CR-002.jpg','images/Bracelets-CR-002-1.jpg'])">
<img src="images/Bracelets-CR-002.jpg">
<p>Chic Radiance</p>
</div>

</div>
</div>

<!-- PRODUCT PAGE -->
<div class="productPage" id="productPage">
<img id="mainImg" style="width:300px">
<div id="gallery" class="gallery"></div>
<h2 id="name"></h2>
<p id="price"></p>

<button class="btn" onclick="addCart()">Add to Cart</button>
<button class="btn" onclick="buy()">Order</button>
<button class="btn" onclick="wishlist()">❤️</button>
<button class="btn" onclick="share()">🔗</button>
<button class="btn" onclick="closePage()">Close</button>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Checkout</button>
</div>

<!-- FOOTER -->
<div class="footer">
<a href="https://www.instagram.com/obira.official">Instagram</a>
<a href="https://youtube.com/@obira.official1">YouTube</a>
<a href="https://pin.it/1wgRAuNBf">Pinterest</a>
<br><br>
© OBIRA 2026
</div>

<script>

let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{slides[i].classList.remove("active");i=(i+1)%slides.length;slides[i].classList.add("active")},3000);

let current={};
function openProduct(n,p,imgs){
current={name:n,price:p,imgs};
productPage.style.display="block";
name.innerText=n;
price.innerText="₹"+p;
mainImg.src=imgs[0];
gallery.innerHTML=imgs.map(img=>`<img src="${img}" onclick="mainImg.src='${img}'">`).join("");
}

function closePage(){productPage.style.display="none"}

let cart=JSON.parse(localStorage.getItem("cart"))||[];
function toggleCart(){document.getElementById("cart").classList.toggle("open")}
function addCart(){cart.push(current);localStorage.setItem("cart",JSON.stringify(cart));render()}
function render(){count.innerText=cart.length;cartItems.innerHTML=cart.map(p=>p.name).join("<br>")}
function buy(){window.open("https://wa.me/918792957799?text="+current.name)}
function checkout(){window.open("https://wa.me/918792957799")}
function wishlist(){alert("Saved ❤️")}
function share(){navigator.share?navigator.share({title:current.name}):alert("Share not supported")}

render();

</script>

</body>
</html>
