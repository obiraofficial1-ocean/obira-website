<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBIRA</title>

<style>
body { margin:0; background:#0a0a0a; color:white; font-family:Arial; }

.hero { position:relative; height:100vh; overflow:hidden; }
.hero video { width:100%; height:100%; object-fit:cover; }
.hero::after { content:""; position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.6); }

.hero-content {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.btn {
  background:white; color:black;
  padding:12px 25px; text-decoration:none;
}

.section { padding:60px 8%; }

.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:30px; }

.product img { width:100%; }

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop>
    <source src="videos/Hero-V1.mp4">
  </video>
  <div class="hero-content">
    <h1>OBIRA</h1>
    <p>Your World, Amplified.</p>
    <a href="#" class="btn">SHOP NOW</a>
  </div>
</section>

<!-- PRODUCTS -->
<section class="section">
<h2>Featured</h2>

<div class="products">

<div class="product">
<img src="images/Bracelets-CR-002.jpg">
<h3>OBIRA Chic Radiance Bracelet</h3>
<p>₹1199</p>
<a href="#" class="btn">ORDER NOW</a>
</div>

<div class="product">
<img src="images/Necklace-Chain-BD-003.jpg">
<h3>OBIRA Bloom Drop Chain</h3>
<p>₹999</p>
<a href="#" class="btn">ORDER NOW</a>
</div>

</div>
</section>

</body>
</html>
