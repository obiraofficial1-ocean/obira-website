<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBIRA</title>

<style>
body { margin:0; font-family:Arial; background:#0a0a0a; color:white; }

/* NAVBAR */
.nav {
  display:flex; justify-content:space-between; padding:20px 8%;
}
.nav a { color:white; text-decoration:none; margin-left:20px; }

/* HERO */
.hero { position:relative; height:100vh; overflow:hidden; }
.hero video { width:100%; height:100%; object-fit:cover; }
.hero::after { content:""; position:absolute; width:100%; height:100%; background:rgba(0,0,0,0.6); }

.hero-content {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.btn { background:white; color:black; padding:12px 25px; text-decoration:none; }

/* SECTION */
.section { padding:80px 8%; }

/* CATEGORIES */
.categories { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
.categories img { width:100%; height:300px; object-fit:cover; }

/* PRODUCTS */
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:30px; }
.product img { width:100%; }

/* STATEMENT */
.statement { text-align:center; padding:100px 20px; }

/* FOOTER */
.footer { text-align:center; padding:40px; border-top:1px solid #333; }
</style>
</head>

<body>

<div class="nav">
<div>OBIRA</div>
<div>
<a href="#">Shop</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</div>

<section class="hero">
<video autoplay muted loop>
<source src="videos/Hero-V1.mp4">
</video>
<div class="hero-content">
<h1>OBIRA</h1>
<p>Your World, Amplified.</p>
<a href="#" class="btn">SHOP NOW</a>
</div>
</section>

<section class="section">
<h2>Categories</h2>
<div class="categories">
<img src="images/bracelets.jpg">
<img src="images/chains.jpg">
<img src="images/hair.jpg">
</div>
</section>

<section class="section">
<h2>Featured Products</h2>
<div class="products">
<!-- ADD PRODUCTS HERE -->
</div>
</section>

<section class="statement">
<p>OBIRA • FOUNDED 2025</p>
<h2>Not made for him or her.<br>Made for you.</h2>
</section>

<section class="section">
<h2>About</h2>
<p>Modern anti-tarnish jewelry designed for everyday expression.</p>
</section>

<div class="footer">
<p>© 2026 OBIRA</p>
<p>Founded in 2025</p>
<a href="#">Instagram</a>
</div>

</body>
</html>
