<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBIRA</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: #f8f6f2;
    color: #111;
}

.header {
    text-align: center;
    padding: 30px 20px;
}

.header img {
    width: 180px;
}

.hero {
    text-align: center;
    padding: 40px 20px;
}

.hero h1 {
    font-size: 28px;
    letter-spacing: 3px;
}

.hero p {
    color: #666;
    margin-top: 10px;
}

.product {
    text-align: center;
    padding: 40px 20px;
}

.product img {
    width: 90%;
    max-width: 350px;
    border-radius: 10px;
}

.price {
    margin-top: 10px;
}

.old {
    text-decoration: line-through;
    color: gray;
}

.new {
    font-size: 22px;
    font-weight: bold;
}

.button {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>

</head>

<body>

<!-- LOGO -->
<div class="header">
    <img src="logo.png" alt="OBIRA Logo">
</div>

<!-- HERO -->
<div class="hero">
    <h1>YOUR WORLD, AMPLIFIED.</h1>
    <p>Minimal. Elegant. Timeless Jewelry.</p>
</div>

<!-- PRODUCT -->
<div class="product">
    <img src="bracelet.jpg" alt="Aurelia Lock Bracelet">

    <h2>Aurelia Lock Bracelet</h2>

    <div class="price">
        <div class="old">₹1999</div>
        <div class="new">₹1199</div>
    </div>

    <p>
        A sleek gold bracelet with signature screw details and a line of sparkling stones—modern, bold, and endlessly elegant.
    </p>

    <a href="https://rzp.io/rzp/6jb3PRi" target="_blank" class="button">
        Buy Now
    </a>
</div>

</body>
</html>
