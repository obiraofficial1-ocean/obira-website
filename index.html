<style>

/* ===== TOP STRIP ===== */
.top-strip{
position:fixed;
top:0;
width:100%;
background:#000;
color:#fff;
font-size:11px;
padding:8px 0;
overflow:hidden;
white-space:nowrap;
z-index:2000;
}

.top-strip span{
display:inline-block;
padding-left:100%;
animation:scroll 14s linear infinite;
letter-spacing:2px;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}

/* ===== HEADER ===== */
.nav{
position:fixed;
top:30px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 8%;
background:rgba(255,255,255,0.85);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(0,0,0,0.05);
z-index:1500;
}

/* LOGO */
.logo img{
width:170px;
cursor:pointer;
}

/* RIGHT SIDE */
.nav-right{
display:flex;
align-items:center;
gap:22px;
}

/* STORE TEXT */
.nav-link{
cursor:pointer;
font-size:14px;
letter-spacing:1px;
transition:0.3s;
}

.nav-link:hover{
opacity:0.6;
}

/* ICONS */
.icon{
cursor:pointer;
font-size:18px;
position:relative;
transition:0.3s;
}

.icon:hover{
transform:scale(1.2);
}

/* CART COUNT */
.cart-icon span{
position:absolute;
top:-6px;
right:-10px;
background:#000;
color:#fff;
font-size:10px;
padding:2px 6px;

}

/* SPACING FIX */
.header-space{

}
