<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OBIRA — Wear What Speaks</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300;1,500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --cream:#FAF6F0;--warm-white:#FDF9F4;--blush:#F2D9CB;
      --rose:#D4826A;--deep-rose:#A85540;--gold:#C9A96E;
      --gold-light:#E8D5A8;--charcoal:#2C2420;--muted:#8A7870;
    }
    html{scroll-behavior:smooth;}
    body{background:var(--cream);color:var(--charcoal);font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none;}
    .cursor{position:fixed;width:10px;height:10px;background:var(--rose);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1.5px solid var(--rose);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.6;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:100;opacity:.3;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.2rem 3rem;display:flex;align-items:center;justify-content:space-between;background:rgba(250,246,240,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,169,110,.15);transition:box-shadow .3s;}
    nav.scrolled{box-shadow:0 4px 30px rgba(44,36,32,.08);}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;letter-spacing:.12em;color:var(--charcoal);text-decoration:none;}
    .nav-logo span{color:var(--rose);}
    .nav-links{display:flex;gap:2rem;list-style:none;}
    .nav-links a{text-decoration:none;font-size:.8rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);position:relative;transition:color .2s;}
    .nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:1px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
    .nav-links a:hover{color:var(--charcoal);}
    .nav-links a:hover::after{transform:scaleX(1);}
    .nav-cart{font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:var(--charcoal);color:var(--cream);padding:.5rem 1.2rem;border-radius:100px;text-decoration:none;transition:background .2s;}
    .nav-cart:hover{background:var(--rose);}

    /* HERO */
    .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;padding-top:80px;overflow:hidden;}
    .hero-left{display:flex;flex-direction:column;justify-content:center;padding:5rem 3rem 5rem 5rem;position:relative;z-index:2;}
    .hero-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--rose);letter-spacing:.08em;margin-bottom:1.2rem;opacity:0;animation:fadeUp .8s .2s forwards;}
    .hero-title{font-family:'Playfair Display',serif;font-size:clamp(3rem,5.5vw,5rem);line-height:1.08;font-weight:700;margin-bottom:1.4rem;opacity:0;animation:fadeUp .8s .4s forwards;}
    .hero-title em{font-style:italic;color:var(--rose);}
    .hero-sub{font-size:.95rem;font-weight:300;color:var(--muted);line-height:1.8;max-width:380px;margin-bottom:2.5rem;opacity:0;animation:fadeUp .8s .6s forwards;}
    .hero-cta-group{display:flex;gap:1rem;align-items:center;opacity:0;animation:fadeUp .8s .8s forwards;}
    .btn-primary{background:var(--charcoal);color:var(--cream);padding:.85rem 2rem;border-radius:100px;font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;transition:background .25s,transform .2s;display:inline-block;}
    .btn-primary:hover{background:var(--rose);transform:translateY(-2px);}
    .btn-secondary{font-size:.8rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s;}
    .btn-secondary::after{content:'→';transition:transform .2s;}
    .btn-secondary:hover{color:var(--charcoal);}
    .btn-secondary:hover::after{transform:translateX(4px);}
    .hero-right{position:relative;background:linear-gradient(135deg,var(--blush),var(--gold-light) 60%,var(--cream));display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .hero-blob{position:absolute;width:70%;aspect-ratio:1;background:radial-gradient(circle at 40% 40%,rgba(212,130,106,.35),rgba(201,169,110,.2) 50%,transparent 70%);border-radius:60% 40% 50% 50%/50% 60% 40% 50%;animation:blobFloat 8s ease-in-out infinite;}
    @keyframes blobFloat{0%,100%{transform:translate(0,0) rotate(0deg);border-radius:60% 40% 50% 50%/50% 60% 40% 50%;}33%{transform:translate(10px,-15px) rotate(5deg);}66%{transform:translate(-10px,10px) rotate(-3deg);}}
    .hero-product{position:relative;z-index:2;width:300px;height:380px;background:rgba(255,255,255,.55);border-radius:24px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.75);overflow:hidden;animation:fadeUp 1s .5s forwards;opacity:0;box-shadow:0 20px 60px rgba(168,85,64,.15);}
    .hero-product img{width:100%;height:100%;object-fit:cover;}
    .hero-tag{position:absolute;background:var(--charcoal);color:var(--cream);padding:.55rem 1rem;border-radius:100px;font-size:.7rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;}
    .hero-tag-1{top:22%;right:6%;}
    .hero-tag-2{bottom:20%;left:4%;background:var(--rose);}
    .hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeIn 1s 1.4s forwards;}
    .scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,var(--gold),transparent);animation:scrollPulse 2s ease-in-out infinite;}
    @keyframes scrollPulse{0%,100%{opacity:.4;}50%{opacity:1;}}
    .scroll-text{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}

    /* MARQUEE */
    .marquee-strip{background:var(--charcoal);color:var(--gold-light);padding:.85rem 0;overflow:hidden;white-space:nowrap;}
    .marquee-inner{display:inline-flex;animation:marquee 22s linear infinite;}
    .marquee-item{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;letter-spacing:.12em;padding:0 2.5rem;}
    .marquee-dot{color:var(--rose);}
    @keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

    /* SECTIONS */
    section{padding:5.5rem 5rem;}
    .section-label{font-size:.7rem;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--rose);margin-bottom:.7rem;}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,2.8rem);line-height:1.15;font-weight:700;margin-bottom:1rem;}
    .section-title em{font-style:italic;color:var(--rose);}

    /* FEATURES */
    .features{background:var(--warm-white);padding:5rem;}
    .features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;margin-top:3rem;}
    .feature-card{background:var(--cream);border-radius:18px;padding:2.2rem 1.8rem;border:1px solid rgba(201,169,110,.2);transition:transform .3s,box-shadow .3s;position:relative;overflow:hidden;}
    .feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--rose),var(--gold));transform:scaleX(0);transform-origin:left;transition:transform .4s;}
    .feature-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(168,85,64,.1);}
    .feature-card:hover::before{transform:scaleX(1);}
    .feature-icon{font-size:2rem;margin-bottom:1rem;}
    .feature-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:.5rem;}
    .feature-desc{font-size:.88rem;font-weight:300;color:var(--muted);line-height:1.7;}

    /* PRODUCTS */
    .products-section{background:var(--cream);padding:5rem;}
    .products-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3rem;}
    .tab-row{display:flex;gap:.8rem;margin-bottom:2.8rem;flex-wrap:wrap;}
    .tab-btn{padding:.6rem 1.4rem;border-radius:100px;border:1.5px solid rgba(201,169,110,.4);background:transparent;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .25s;}
    .tab-btn.active,.tab-btn:hover{background:var(--charcoal);color:var(--cream);border-color:var(--charcoal);}
    .tab-panel{display:none;}
    .tab-panel.active{display:grid;grid-template-columns:repeat(4,1fr);gap:1.6rem;}
    .product-card{border-radius:18px;overflow:hidden;background:var(--warm-white);border:1px solid rgba(201,169,110,.15);transition:transform .3s,box-shadow .3s;cursor:pointer;}
    .product-card:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(44,36,32,.12);}
    .product-img{aspect-ratio:4/5;position:relative;overflow:hidden;}
    .product-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
    .product-card:hover .product-img img{transform:scale(1.06);}
    .product-overlay{position:absolute;inset:0;background:rgba(44,36,32,.7);display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:.75rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;opacity:0;transition:opacity .3s;}
    .product-card:hover .product-overlay{opacity:1;}
    .product-info{padding:1.2rem 1.3rem 1.4rem;}
    .product-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem;}
    .product-badge{font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--rose);font-weight:500;}
    .product-discount{font-size:.62rem;letter-spacing:.1em;background:rgba(212,130,106,.12);color:var(--rose);padding:.15rem .5rem;border-radius:100px;font-weight:500;}
    .product-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;margin-bottom:.3rem;}
    .product-desc{font-size:.78rem;color:var(--muted);font-weight:300;margin-bottom:.7rem;line-height:1.5;}
    .product-footer{display:flex;align-items:center;justify-content:space-between;}
    .price-group{display:flex;align-items:center;gap:.5rem;}
    .product-price{font-size:.95rem;font-weight:600;color:var(--charcoal);}
    .product-mrp{font-size:.78rem;color:var(--muted);text-decoration:line-through;}
    .product-stars{font-size:.7rem;color:var(--gold);}

    /* ABOUT */
    .about{background:var(--charcoal);color:var(--cream);display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;}
    .about-visual{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .about-img{border-radius:16px;overflow:hidden;}
    .about-img img{width:100%;height:220px;object-fit:cover;}
    .about-img.tall img{height:340px;}
    .about-text .section-label{color:var(--gold);}
    .about-text .section-title{color:var(--cream);}
    .about-text .section-title em{color:var(--gold);}
    .about-body{font-size:.93rem;font-weight:300;line-height:1.9;color:rgba(253,249,244,.7);margin-bottom:1.5rem;}
    .about-stats{display:flex;gap:2.5rem;margin-top:2rem;}
    .stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--gold);line-height:1;}
    .stat-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(253,249,244,.4);margin-top:.3rem;}

    /* TESTIMONIALS */
    .testimonials{background:var(--warm-white);text-align:center;}
    .testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.8rem;margin-top:3rem;}
    .testimonial-card{background:var(--cream);border-radius:18px;padding:2rem;border:1px solid rgba(201,169,110,.2);text-align:left;position:relative;}
    .testimonial-quote{font-family:'Playfair Display',serif;font-size:3rem;line-height:1;color:var(--gold-light);position:absolute;top:.8rem;right:1.2rem;}
    .testimonial-text{font-size:.9rem;font-weight:300;line-height:1.8;font-style:italic;margin-bottom:1.3rem;}
    .testimonial-author{display:flex;align-items:center;gap:.8rem;}
    .author-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blush),var(--rose));display:flex;align-items:center;justify-content:center;font-size:.9rem;}
    .author-name{font-size:.83rem;font-weight:500;}
    .author-stars{font-size:.65rem;color:var(--gold);}

    /* NEWSLETTER */
    .newsletter{background:linear-gradient(135deg,var(--rose),var(--deep-rose));color:var(--cream);text-align:center;padding:5rem;}
    .newsletter .section-title{color:var(--cream);font-size:2.4rem;}
    .newsletter .section-title em{color:var(--gold-light);}
    .newsletter-sub{font-size:.95rem;font-weight:300;opacity:.8;margin:1rem 0 2.2rem;}
    .newsletter-form{display:flex;max-width:440px;margin:0 auto;background:rgba(255,255,255,.15);border-radius:100px;border:1px solid rgba(255,255,255,.3);backdrop-filter:blur(10px);overflow:hidden;}
    .newsletter-input{flex:1;padding:1rem 1.4rem;background:transparent;border:none;outline:none;color:var(--cream);font-size:.88rem;font-family:'DM Sans',sans-serif;}
    .newsletter-input::placeholder{color:rgba(253,249,244,.6);}
    .newsletter-btn{background:var(--cream);color:var(--deep-rose);border:none;cursor:pointer;padding:1rem 1.6rem;font-size:.76rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;font-family:'DM Sans',sans-serif;border-radius:100px;transition:background .2s,color .2s;}
    .newsletter-btn:hover{background:var(--charcoal);color:var(--cream);}

    /* FOOTER */
    footer{background:var(--charcoal);color:var(--cream);padding:3.5rem 5rem 2rem;}
    .footer-top{display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:2.5rem;margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid rgba(253,249,244,.08);}
    .footer-brand-name{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;letter-spacing:.1em;margin-bottom:.8rem;}
    .footer-brand-name span{color:var(--rose);}
    .footer-tagline{font-size:.82rem;font-weight:300;color:rgba(253,249,244,.5);line-height:1.7;margin-bottom:1.3rem;}
    .footer-socials{display:flex;gap:.7rem;}
    .social-btn{width:34px;height:34px;background:rgba(253,249,244,.06);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:.85rem;transition:background .2s;}
    .social-btn:hover{background:var(--rose);}
    .footer-col-title{font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
    .footer-links{list-style:none;display:flex;flex-direction:column;gap:.6rem;}
    .footer-links a{text-decoration:none;font-size:.82rem;font-weight:300;color:rgba(253,249,244,.5);transition:color .2s;}
    .footer-links a:hover{color:var(--cream);}
    .footer-bottom{display:flex;justify-content:space-between;align-items:center;font-size:.73rem;color:rgba(253,249,244,.3);}
    .footer-bottom a{color:rgba(253,249,244,.4);text-decoration:none;}

    /* ANIMATIONS */
    .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s,transform .7s;}
    .reveal.visible{opacity:1;transform:translateY(0);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}

    /* MOBILE */
    @media(max-width:900px){
      nav{padding:1.1rem 1.4rem;}
      .nav-links{display:none;}
      .hero{grid-template-columns:1fr;}
      .hero-left{padding:4.5rem 1.8rem 2.5rem;}
      .hero-right{height:320px;}
      section,.features,.about,.newsletter,footer,.products-section{padding:3.5rem 1.8rem;}
      .features-grid{grid-template-columns:1fr;}
      .tab-panel.active{grid-template-columns:1fr 1fr;}
      .about{grid-template-columns:1fr;}
      .about-visual{margin-bottom:2rem;}
      .testimonials-grid{grid-template-columns:1fr;}
      .footer-top{grid-template-columns:1fr 1fr;}
    }
  </style>
</head>
