<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBIRA</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
body{
margin:0;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

/* TOP STRIP */
.top-strip{
background:#000;
color:#fff;
text-align:center;
font-size:11px;
padding:10px;
letter-spacing:3px;
}

/* NAVBAR */
.nav{
position:fixed;
top:32px;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(0,0,0,0.05);
z-index:1000;
}

/* LOGO */
.logo{
font-family:'Playfair Display';
font-size:26px;
letter-spacing:4px;
font-weight:600;
}

/* LINKS */
.nav-links{
display:flex;
gap:28px;
}

.nav-links a{
text-decoration:none;
color:#333;
font-size:13px;
letter-spacing:1px;
position:relative;
}

/* HOVER EFFECT */
.nav-links a::after{
content:'';
position:absolute;
bottom:-5px;
left:0;
width:0%;
height:1px;
background:#000;
transition:0.3s;
}

.nav-links a:hover::after{
width:100%;
}

.nav-links a:hover{
color:#000;
}

/* ICONS */
.icons{
display:flex;
gap:20px;
font-size:18px;
}

.icons span{
cursor:pointer;
transition:0.3s;
}

.icons span:hover{
transform:scale(1.2);
opacity:0.7;
}

/* SPACING */
.space{
height:110px;
}

/* DUMMY SECTIONS (for scroll test) */
section{
height:100vh;
padding:40px;
}

#store{background:#f9f9f9;}
#bracelets{background:#fff;}
#chains{background:#f4f4f4;}
#hair{background:#fff;}
#about{background:#f9f9f9;}

</style>
</head>

<body>

<!-- TOP STRIP -->
<div class="top-strip">
ANTI-TARNISH • STAINLESS STEEL • WATER RESISTANT • EVERYDAY LUXURY
</div>

<!-- HEADER -->
<div class="nav">

<div class="logo">OBIRA</div>

<div class="nav-links">
<a href="#store">Store</a>
<a href="#bracelets">Bracelets</a>
<a href="#chains">Chains</a>
<a href="#hair">Hair</a>
<a href="#about">About</a>
</div>

<div class="icons">
<span>♡</span>
<span>🛒</span>
</div>

</div>

<div class="space"></div>

<!-- TEMP SECTIONS (JUST TO TEST SCROLL) -->
<section id="store"><h2>Store Section</h2></section>
<section id="bracelets"><h2>Bracelets</h2></section>
<section id="chains"><h2>Chains</h2></section>
<section id="hair"><h2>Hair Accessories</h2></section>
<section id="about"><h2>About OBIRA</h2></section>

</body>
</html>
