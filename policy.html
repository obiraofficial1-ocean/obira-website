<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - OBIRA</title>

<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <img src="logo.png" alt="OBIRA">
  </div>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<!-- PRODUCT SECTION -->
<section class="product-page">

  <!-- IMAGE -->
  <div class="product-image">
    <img id="p-img" src="" alt="Product">
  </div>

  <!-- DETAILS -->
  <div class="product-details">
    <h2 id="p-name"></h2>
    <p id="p-price"></p>

    <!-- QUANTITY -->
    <div class="qty-controls">
      <button onclick="decreaseQtyFromProduct()">-</button>
      <span id="p-qty">1</span>
      <button onclick="increaseQtyFromProduct()">+</button>
    </div>

    <!-- ADD TO CART -->
    <button class="add-btn" onclick="addToCartFromProduct()">
      Add to Cart
    </button>

  </div>

</section>

<!-- SUGGESTIONS -->
<section class="suggestions">
  <h3>You may also like</h3>

  <div id="suggested-products" class="suggested-grid"></div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-grid">

    <div>
      <h3>OBIRA</h3>
      <div class="social-icons">
        <a href="https://www.instagram.com/obira.official?igsh=MXU2YmJlZ29razZkag==" target="_blank"><i class="fab fa-instagram"></i></a>

        <a href="https://pin.it/7GoYisUBN" target="_blank"><i class="fab fa-pinterest"></i></a>
      </div>
    </div>

    <div>
      <h3>Contact</h3>
      <p>Email: obiraofficial1@gmail.com</p>
      <p>Phone: +91 8792957799</p>
    </div>

    <div>
      <h3>Help</h3>
      <ul>
        <li><a href="policy.html">•Store Policy</a></li>
        <li><a href="privacy.html">•Privacy Policy</a></li>
        <li><a href="track.html">•Track Order</a></li>
        <li><a href="no-returns.html">•No Returns Policy</a></li>
      </ul>
    </div>

  </div>
</footer>
