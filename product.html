<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - OBIRA</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="cart.html">Cart</a>
  </div>
</div>

<!-- PRODUCT SECTION -->
<div class="product-page">

  <img id="p-img" src="" alt="Product">

  <div class="product-details">
    <h2 id="p-name"></h2>
    <p id="p-price"></p>

    <div class="qty-controls">
      <button onclick="decreaseQtyFromProduct()">-</button>
      <span id="p-qty">1</span>
      <button onclick="increaseQtyFromProduct()">+</button>
    </div>

    <button onclick="addToCartFromProduct()">Add to Cart</button>

  </div>

</div>

<!-- SUGGESTIONS -->
<div class="suggestions">
  <h3>You may also like</h3>
  <div id="suggested-products"></div>
</div>

<!-- FOOTER -->
<div class="footer">
  <div class="footer-grid">

    <div>
      <h3>OBIRA</h3>
      <div class="social-icons">
        <a href="https://www.instagram.com/obira.official?igsh=MXU2YmJlZ29razZkag==" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.facebook.com/share/1CZx4pnAAb/" target="_blank"><i class="fab fa-facebook"></i></a>

    </div>

    <div>
      <h3>Contact</h3>
      <p>Email: obiraofficial1@gmail.com</p>
      <p>Phone: +91 8792957799</p>
    </div>

  </div>
</div>
