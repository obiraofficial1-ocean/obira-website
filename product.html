<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | OBIRA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="products.js"></script>
  <script src="script.js"></script>
</head>
<body>
  <!-- HEADER (shared) -->
  <header class="header">
    <div class="logo">
      <img src="logo.png" alt="OBIRA">
    </div>
    <nav class="nav">
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
      <a href="store.html"><i class="fa fa-store"></i> Store</a>
      <a href="wishlist.html" id="wishlist-link"><i class="fa fa-heart"></i> Favourites <span id="wishlist-badge" class="wishlist-badge">0</span></a>
      <a href="cart.html"><i class="fa fa-shopping-cart cart-icon"></i> Cart <span id="cart-badge">0</span></a>
    </nav>
  </header>
  <section class="product-page">
    <div class="product-image">
      <img id="p-img" src="" alt=""/>
      <button id="product-wishlist-btn" class="wishlist-btn" title="Add to wishlist">♥</button>
    </div>
    <div class="product-details">
      <h2 id="p-name"></h2>
      <div class="price" id="p-price"></div>
      <div class="qty-controls">
        <button onclick="decreaseQtyFromProduct()">−</button>
        <span id="p-qty">1</span>
        <button onclick="increaseQtyFromProduct()">+</button>
      </div>
      <button onclick="addToCartFromProduct()">Add to Cart</button>
    </div>
  </section>
  <section class="suggestions">
    <h3>You May Also Like</h3>
    <div id="suggested-products"></div>
  </section>
  <div id="notification"></div>
  <script>
    // Highlight wishlist button on load
    document.addEventListener('DOMContentLoaded', function () {
      const btn = document.getElementById('product-wishlist-btn');
      const id = localStorage.getItem('selectedProduct');
      const wl = (JSON.parse(localStorage.getItem('wishlist'))||[]).map(x=>x.id);
      if (wl.includes(id)) btn.classList.add('active');
      btn.onclick = function(e){ toggleWishlist(id, e); };
    });
  </script>
</body>
</html>
