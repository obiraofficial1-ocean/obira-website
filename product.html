<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBIRA Product</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ===== TOP STRIP ===== -->
<div class="top-strip">
ANTI-TARNISH • STAINLESS STEEL • WATER RESISTANT • EVERYDAY LUXURY
</div>

<!-- ===== HEADER ===== -->
<header class="header">
<div class="header-inner">

<div class="logo">
<a href="index.html"><img src="logo.png"></a>
</div>

<div class="nav-right">
<a href="store.html">Store</a>
<span onclick="wishlistOpen()">♡</span>
<a href="cart.html">🛒 <span id="cart-count">0</span></a>
</div>

</div>
</header>

<div class="header-space"></div>

<!-- ===== PRODUCT SECTION ===== -->
<section class="product-page">

<div class="product-container">

<!-- LEFT: IMAGE -->
<div class="product-images">

<img id="product-main-img" src="">

<div id="product-gallery" class="gallery"></div>

</div>

<!-- RIGHT: DETAILS -->
<div class="product-details">

<h1 id="product-name"></h1>

<p id="product-price"></p>

<p id="product-desc"></p>

<div class="product-buttons">

<button onclick="addToCart(getProductId())">Add to Cart</button>

<button onclick="toggleWishlist(getProductId())">♡ Wishlist</button>

<button onclick="shareCurrentProduct()">Share</button>

</div>

</div>

</div>

</section>

<!-- ===== FOOTER ===== -->
<footer class="footer">

<p>OBIRA</p>

<div class="socials">

<a href="https://www.instagram.com/obira.official" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/24/2111/2111463.png">
</a>

<a href="https://www.facebook.com/share/1ASSUzxYhN/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/24/733/733547.png">
</a>

<a href="https://youtube.com/@obira.official1" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/24/1384/1384060.png">
</a>

<a href="https://pin.it/1wgRAuNBf" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/24/733/733558.png">
</a>

</div>

<p>© 2025 OBIRA. All rights reserved.</p>

</footer>

<!-- SCRIPTS -->
<script src="products.js"></script>
<script src="script.js"></script>

<script>

/* GET PRODUCT ID FROM URL */
function getProductId(){
const params = new URLSearchParams(window.location.search);
return params.get("id");
}

/* SHARE CURRENT PRODUCT */
function shareCurrentProduct(){
const id = getProductId();
const product = products.find(p => p.id === id);
shareProduct(product);
}

</script>

</body>
</html>
