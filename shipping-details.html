<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipping Details - OBIRA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <img src="logo.png" alt="OBIRA">
    </div>
    <nav class="nav">
      <a href="index.html"><i class="fa fa-home"></i> Home</a>
      <a href="store.html"><i class="fa fa-store"></i> Store</a>
      <a href="wishlist.html" id="wishlist-link">
        <i class="fa fa-heart"></i>
        Favourites
        <span id="wishlist-badge" class="wishlist-badge">0</span>
      </a>
      <a href="cart.html"><i class="fa fa-shopping-cart cart-icon"></i> Cart <span id="cart-badge">0</span></a>
    </nav>
  </header>

  <!-- SHIPPING FORM -->
  <section style="padding: 40px 20px;">
    <h2>Shipping Address & Contact Details</h2>
    
    <div style="max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
      <form id="shipping-form" onsubmit="submitShippingDetails(event)">
        
        <!-- Full Name -->
        <div style="margin-bottom: 20px;">
          <label for="full-name" style="display: block; margin-bottom: 8px; font-weight: 600;">Full Name *</label>
          <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- Email -->
        <div style="margin-bottom: 20px;">
          <label for="email" style="display: block; margin-bottom: 8px; font-weight: 600;">Email Address *</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- Phone Number -->
        <div style="margin-bottom: 20px;">
          <label for="phone" style="display: block; margin-bottom: 8px; font-weight: 600;">Phone Number *</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- Address Line 1 -->
        <div style="margin-bottom: 20px;">
          <label for="address-1" style="display: block; margin-bottom: 8px; font-weight: 600;">Address Line 1 *</label>
          <input type="text" id="address-1" name="address-1" placeholder="House/Flat No., Building Name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- Address Line 2 -->
        <div style="margin-bottom: 20px;">
          <label for="address-2" style="display: block; margin-bottom: 8px; font-weight: 600;">Address Line 2</label>
          <input type="text" id="address-2" name="address-2" placeholder="Road name, Area, Colony" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- City -->
        <div style="margin-bottom: 20px;">
          <label for="city" style="display: block; margin-bottom: 8px; font-weight: 600;">City *</label>
          <input type="text" id="city" name="city" placeholder="Enter your city" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- State -->
        <div style="margin-bottom: 20px;">
          <label for="state" style="display: block; margin-bottom: 8px; font-weight: 600;">State/Province *</label>
          <input type="text" id="state" name="state" placeholder="Enter your state" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- Postal Code -->
        <div style="margin-bottom: 20px;">
          <label for="postal-code" style="display: block; margin-bottom: 8px; font-weight: 600;">Postal Code *</label>
          <input type="text" id="postal-code" name="postal-code" placeholder="Enter postal code" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;">
        </div>

        <!-- Country -->
        <div style="margin-bottom: 20px;">
          <label for="country" style="display: block; margin-bottom: 8px; font-weight: 600;">Country *</label>
          <input type="text" id="country" name="country" placeholder="Enter your country" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1em;" value="India">
        </div>

        <!-- Submit Button -->
        <button type="submit" style="width: 100%; padding: 14px; background: #111; color: white; border: none; border-radius: 5px; font-size: 1.05em; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 20px;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#111'">
          Confirm & Continue
        </button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-grid">
      <div>
        <h3>OBIRA</h3>
        <div class="social-icons">
          <a href="https://www.instagram.com/obira.official?igsh=MXU2YmJlZ29razZkag==" target="_blank"><i class="fab fa-instagram"></i></a>
          <a href="https://www.facebook.com/share/1CZx4pnAAb/" target="_blank"><i class="fab fa-facebook"></i></a>
          <a href="https://www.youtube.com/@OBIRA.OFFICIAL1" target="_blank"><i class="fab fa-youtube"></i></a>
          <a href="https://pin.it/7GoYisUBN" target="_blank"><i class="fab fa-pinterest"></i></a>
        </div>
      </div>
      <div>
        <h3>Contact</h3>
        <p>Email: obiraofficial1@gmail.com</p>
        <p>Phone: +91 8792957799</p>
      </div>
      <div>
        <h3>Help</h3>
        <ul>
          <li><a href="policy.html">•Store Policy</a></li>
          <li><a href="privacy.html">•Privacy Policy</a></li>
          <li><a href="track.html">•Track Order</a></li>
          <li><a href="no-returns.html">•No Returns Policy</a></li>
        </ul>
      </div>
    </div>
  </footer>

  <div id="notification" class="notification"></div>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script>
    function submitShippingDetails(event) {
      event.preventDefault();
      
      // Collect shipping details
      const shippingDetails = {
        fullName: document.getElementById('full-name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        address1: document.getElementById('address-1').value,
        address2: document.getElementById('address-2').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        postalCode: document.getElementById('postal-code').value,
        country: document.getElementById('country').value
      };
      
      // Save to localStorage
      localStorage.setItem('shippingDetails', JSON.stringify(shippingDetails));
      
      // Get payment ID and show success page
      const paymentId = sessionStorage.getItem('paymentId');
      if (paymentId) {
        window.location.href = 'order-confirmation.html';
      } else {
        showNotification('Error: Payment information not found. Please try again.');
        setTimeout(() => {
          window.location.href = 'store.html';
        }, 2000);
      }
    }
  </script>
</body>
</html>
