<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .product {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .filter-sort {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>All Products</h1>
        <div class="filter-sort">
            <label for="filter">Filter:</label>
            <select id="filter">
                <option value="all">All</option>
                <option value="category1">Category 1</option>
                <option value="category2">Category 2</option>
            </select>
            <label for="sort">Sort by:</label>
            <select id="sort">
                <option value="name">Name</option>
                <option value="price">Price</option>
            </select>
        </div>
        <div class="grid">
            <div class="product">
                <h2>Product 1</h2>
                <p>Price: $10</p>
            </div>
            <div class="product">
                <h2>Product 2</h2>
                <p>Price: $20</p>
            </div>
            <div class="product">
                <h2>Product 3</h2>
                <p>Price: $30</p>
            </div>
            <!-- Add more products as needed -->
        </div>
    </div>
</body>
</html>
