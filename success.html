<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .success-icon {
            font-size: 60px;
            color: #28a745;
            margin: 20px 0;
        }
        h1 {
            color: #333;
            margin: 20px 0;
            font-size: 32px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin: 20px 0;
        }
        .order-number {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 5px;
        }
        button:hover {
            background-color: #218838;
        }
        .secondary-button {
            background-color: #6c757d;
        }
        .secondary-button:hover {
            background-color: #5a6268;
        }
        .button-group {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Success!</h1>
        <p>Your transaction has been completed successfully.</p>
        
        <div class="order-number">
            Order Number: ORD-<span id="orderNum">123456</span>
        </div>
        
        <p>Thank you for your purchase! A confirmation email has been sent to your registered email address.</p>
        <p>You can track your order status using the order number above.</p>
        
        <div class="button-group">
            <button onclick="goHome()">Back to Home</button>
            <button class="secondary-button" onclick="trackOrder()">Track Order</button>
        </div>
    </div>
    
    <script>
        function goHome() {
            window.location.href = 'index.html';
        }
        
        function trackOrder() {
            window.location.href = 'track.html';
        }
        
        // Generate a random order number on page load
        document.getElementById('orderNum').textContent = Math.floor(100000 + Math.random() * 900000);
    </script>
</body>
</html>
